name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:   # 手动触发

jobs:
  # ── 后端测试 ──────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jthub
          POSTGRES_PASSWORD: jthub_test
          POSTGRES_DB: jthub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: backend
        run: pnpm db:generate

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://jthub:jthub_test@localhost:5432/jthub_test
          JWT_SECRET: ci-test-jwt-secret-at-least-16-chars
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD_HASH: $2b$10$ci-test-placeholder-hash
        run: pnpm test

  # ── 类型检查 ──────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: backend
        run: pnpm db:generate

      - name: TypeScript check (backend)
        working-directory: backend
        run: pnpm build   # tsc 编译 = 类型检查

      - name: TypeScript check (frontend)
        working-directory: frontend
        run: npx vue-tsc --noEmit
