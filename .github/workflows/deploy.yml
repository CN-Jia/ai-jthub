name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # 也支持手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/cn-jia/jthub-backend
  IMAGE_NGINX: ghcr.io/cn-jia/jthub-nginx

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # ── 登录 GHCR ──────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 构建 + 推送 Backend 镜像 ────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 构建 + 推送 Nginx 镜像 ──────────────────────────────
      - name: Build & push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: |
            ${{ env.IMAGE_NGINX }}:latest
            ${{ env.IMAGE_NGINX }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 部署到生产服务器 ─────────────────────────────────────
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo ">>> Pull latest images..."
            cd /var/www/jthub
            docker compose -f docker-compose.prod.yml pull

            echo ">>> Redeploy containers..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo ">>> Run database migration..."
            docker compose -f docker-compose.prod.yml exec -T backend \
              npx prisma migrate deploy

            echo ">>> Prune old images..."
            docker image prune -af

            echo ">>> Health check..."
            sleep 3
            curl -f http://localhost:80/health || { echo "Health check failed"; exit 1; }

            echo ">>> Deploy completed successfully!"
