<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#050d1a"/>

  <!-- Background hex grid dots -->
  <circle cx="128" cy="128" r="3" fill="#00d4ff" opacity="0.12"/>
  <circle cx="256" cy="128" r="3" fill="#00d4ff" opacity="0.08"/>
  <circle cx="384" cy="128" r="3" fill="#00d4ff" opacity="0.12"/>
  <circle cx="64"  cy="256" r="3" fill="#00d4ff" opacity="0.08"/>
  <circle cx="448" cy="256" r="3" fill="#00d4ff" opacity="0.08"/>
  <circle cx="128" cy="384" r="3" fill="#a855f7" opacity="0.12"/>
  <circle cx="256" cy="384" r="3" fill="#a855f7" opacity="0.08"/>
  <circle cx="384" cy="384" r="3" fill="#a855f7" opacity="0.12"/>

  <!-- Outer hexagon -->
  <polygon
    points="256,48 432,150 432,362 256,464 80,362 80,150"
    fill="url(#g2)" stroke="url(#g1)" stroke-width="8"
    filter="url(#glow)"
  />

  <!-- Inner hexagon (subtle) -->
  <polygon
    points="256,110 390,185 390,327 256,402 122,327 122,185"
    fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.25"
  />

  <!-- Corner accent dots -->
  <circle cx="256" cy="48"  r="9" fill="#00d4ff" opacity="0.95"/>
  <circle cx="432" cy="150" r="7" fill="#00d4ff" opacity="0.6"/>
  <circle cx="432" cy="362" r="7" fill="#a855f7" opacity="0.6"/>
  <circle cx="256" cy="464" r="9" fill="#a855f7" opacity="0.95"/>
  <circle cx="80"  cy="362" r="7" fill="#a855f7" opacity="0.6"/>
  <circle cx="80"  cy="150" r="7" fill="#00d4ff" opacity="0.6"/>

  <!-- JT text -->
  <text
    x="256" y="322"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="196"
    fill="url(#g1)"
    text-anchor="middle"
    letter-spacing="-8"
  >JT</text>
</svg>
