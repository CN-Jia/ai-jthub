# JT-Hub Nginx Docker 配置 — 容器内使用
# 用户端 / + 管理端 /admin/ + API 反向代理到 backend 容器

upstream jthub_api {
    server backend:3000;
    keepalive 32;
}

# ── HTTP → HTTPS 重定向 ──────────────────────────────────────
server {
    listen 80;
    server_name jthub.cc.cd www.jthub.cc.cd dzhub.ccwu.cc www.dzhub.ccwu.cc;

    # Certbot 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主服务 ─────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name jthub.cc.cd www.jthub.cc.cd dzhub.ccwu.cc www.dzhub.ccwu.cc;

    ssl_certificate     /etc/letsencrypt/live/jthub.cc.cd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jthub.cc.cd/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 健康检查
    location = /health {
        proxy_pass http://jthub_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 用户端静态文件
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # 静态资源长缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://jthub_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 110m;
    }

    # 管理后台（子路径 /admin/）
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # Certbot 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
